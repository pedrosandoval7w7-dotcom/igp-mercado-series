<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP - Transfer Hub Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --f1-red: #ff1801; --bg: #050505; --panel: #111116; --gold: #f5b942; --text: #f0f0f0; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout Profesional */
        .admin-bar { background: var(--f1-red); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .main-container { display: grid; grid-template-columns: 320px 1fr 350px; gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden; }
        .column { background: var(--panel); border-radius: 4px; border: 1px solid #222; display: flex; flex-direction: column; }
        .col-header { background: #1a1a20; padding: 12px; font-weight: bold; border-bottom: 3px solid var(--f1-red); letter-spacing: 1px; }

        /* Tarjetas y Contenido */
        .card { background: #16161d; border-radius: 6px; padding: 15px; border-left: 4px solid var(--gold); margin-bottom: 15px; position: relative; }
        .team-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .slot { background: #0d0d12; margin: 6px 0; padding: 10px; border-radius: 4px; border: 1px solid #252525; }
        
        /* Inputs y Botones */
        input, select { background: #000; border: 1px solid #333; color: white; padding: 5px; border-radius: 3px; font-size: 0.9em; }
        .btn-del { background: transparent; border: 1px solid #444; color: #777; cursor: pointer; padding: 2px 8px; font-size: 0.7em; }
        .btn-del:hover { background: var(--f1-red); color: white; }
        .move-controls { font-size: 0.75em; margin-top: 5px; display: flex; gap: 5px; }

        /* Mercado en Vivo */
        #feed { padding: 10px; overflow-y: auto; }
        .feed-item { background: #1a1a24; border-left: 4px solid #28a745; padding: 10px; margin-bottom: 10px; font-size: 0.8em; }
        .locked { pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

<div class="admin-bar">
    <strong style="font-size: 1.2em;">INTERCONTINENTAL SERIES | HUB ADMINISTRATIVO</strong>
    <div>
        <input type="password" id="admin-pass" placeholder="Clave">
        <button onclick="toggleAdmin()" style="background: black; color: white; cursor: pointer; border: none; padding: 5px 15px;">MODO ADMIN</button>
    </div>
</div>

<div class="main-container">
    <!-- COLUMNA 1: MERCADO EN VIVO -->
    <div class="column">
        <div class="col-header">MERCADO EN VIVO</div>
        <div id="feed"></div>
    </div>

    <!-- COLUMNA 2: GESTIÓN (CENTRO) -->
    <div class="column">
        <div class="col-header">GESTIÓN DE ESCUDERÍAS (F1-F5, K6)</div>
        <div style="padding: 15px; overflow-y: auto;">
            <div id="admin-controls" style="display: none; background: #1a1a20; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                <select id="new-cat"><option>F1</option><option>F2</option><option>F3</option><option>F4</option><option>F5</option><option>K6</option></select>
                <input type="text" id="new-team" placeholder="Nombre Escudería">
                <input type="text" id="new-ceo" placeholder="CEO">
                <button onclick="crearEquipo()" style="background: var(--f1-red); color:white; border:none; padding: 8px;">+ CREAR</button>
            </div>
            <div id="content" class="locked"></div>
        </div>
    </div>

    <!-- COLUMNA 3: NOTICIAS (DERECHA) -->
    <div class="column">
        <div class="col-header">GENERADOR DE NOTICIAS</div>
        <div id="news-preview" style="padding: 20px; color: #555; text-align: center;">Selecciona un traspaso para generar la imagen oficial.</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBIo1hhtqKMSsBRN2b0b4k3taWugegbo8A",
        authDomain: "igp-mercado-live.firebaseapp.com",
        databaseURL: "https://igp-mercado-live-default-rtdb.firebaseio.com",
        projectId: "igp-mercado-live",
        storageBucket: "igp-mercado-live.firebasestorage.app",
        messagingSenderId: "926047332363",
        appId: "1:926047332363:web:d5f4e257126cea7af6ff0e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;
    let listaEquipos = [];

    function toggleAdmin() {
        if(document.getElementById('admin-pass').value === "IGP2026") {
            isAdmin = true;
            document.getElementById('content').classList.remove('locked');
            document.getElementById('admin-controls').style.display = 'block';
            alert("Acceso Total Activado");
        }
    }

    function crearEquipo() {
        const c = document.getElementById('new-cat').value;
        const t = document.getElementById('new-team').value;
        const ceo = document.getElementById('new-ceo').value;
        db.ref(`ligas/${c}/${t}`).set({ ceo: ceo, m1: "Libre", m2: "Libre", m3: "Libre", m4: "Libre" });
    }

    function borrarEquipo(cat, team) {
        if(confirm(`¿Eliminar ${team}?`)) db.ref(`ligas/${cat}/${team}`).remove();
    }

    function traspasar(catOrig, teamOrig, slot, nombre, teamDest) {
        if(teamDest === "") return;
        const catDest = teamDest.split('|')[0];
        const tDest = teamDest.split('|')[1];

        // 1. Poner como 'Libre' en origen
        db.ref(`ligas/${catOrig}/${teamOrig}/${slot}`).set("Libre");
        // 2. Buscar slot libre en destino (M1 por defecto en este ejemplo simple)
        db.ref(`ligas/${catDest}/${tDest}/m1`).set(nombre);
        
        db.ref('feed').push({ 
            msg: `TRASPASO: ${nombre} deja ${teamOrig} y se une a ${tDest}`, 
            time: Date.now() 
        });
    }

    db.ref('ligas').on('value', snap => {
        const data = snap.val();
        const cont = document.getElementById('content');
        cont.innerHTML = "";
        listaEquipos = [];

        for(let c in data) {
            cont.innerHTML += `<div style="color:var(--f1-red); font-weight:bold; margin: 15px 0 5px;">CATEGORÍA ${c}</div>`;
            for(let t in data[c]) {
                listaEquipos.push(`${c}|${t}`);
                const e = data[c][t];
                let card = `<div class="card"><div class="team-header"><div><strong>${t}</strong><br><small>CEO: ${e.ceo}</small></div><button class="btn-del" onclick="borrarEquipo('${c}','${t}')">X</button></div>`;
                [1,2,3,4].forEach(n => {
                    card += `<div class="slot">M${n}: ${e['m'+n]}
                        <div class="move-controls">
                            <select onchange="traspasar('${c}','${t}','m${n}','${e['m'+n]}', this.value)">
                                <option value="">Mover a...</option>
                                ${listaEquipos.map(le => `<option value="${le}">${le.split('|')[1]}</option>`).join('')}
                            </select>
                        </div>
                    </div>`;
                });
                cont.innerHTML += card + `</div>`;
            }
        }
    });

    db.ref('feed').limitToLast(10).on('value', snap => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach(c => { feed.innerHTML = `<div class="feed-item">${c.val().msg}</div>` + feed.innerHTML; });
    });
</script>
</body>
</html>
