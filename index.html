<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP Manager - Intercontinental Series Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --f1-red: #e10600; --bg: #0c0c0e; --card: #18181e; --border: #2d2d37; --text: #e1e1e6; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Navbar Superior Estilo 66514.jpg */
        .top-nav { background: #111115; border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { font-weight: 800; letter-spacing: 1px; color: white; display: flex; align-items: center; gap: 10px; }
        .logo-area span { color: var(--f1-red); }

        .main-container { display: grid; grid-template-columns: 320px 1fr 380px; gap: 10px; padding: 10px; flex-grow: 1; overflow: hidden; background: #08080a; }
        .col { background: #111115; border-radius: 4px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-header { background: #1c1c24; padding: 12px; font-size: 0.85em; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid var(--border); color: #fff; }

        /* Estilo de Tarjetas de Escudería */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 15px; overflow-y: auto; }
        .team-card { background: var(--card); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
        .team-head { background: linear-gradient(90deg, #1c1c24 0%, #14141a 100%); padding: 10px 15px; border-bottom: 1px solid var(--border); }
        .team-name { font-weight: bold; color: #fff; font-size: 0.95em; }
        .ceo-label { font-size: 0.75em; color: #888; }

        .slot-list { padding: 8px; }
        .slot { background: #22222a; margin-bottom: 4px; padding: 8px 12px; border-radius: 3px; font-size: 0.85em; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .slot:hover { border-color: #3d3d4d; }
        .slot-name { color: #fff; font-weight: 500; }
        .slot-id { color: var(--f1-red); font-weight: bold; margin-right: 10px; }

        /* Controles Admin Ocultos */
        .admin-only { display: none; margin-top: 5px; }
        .admin-active .admin-only { display: block; }
        .btn-del { background: var(--f1-red); border: none; color: white; padding: 2px 6px; cursor: pointer; border-radius: 2px; font-size: 0.7em; }

        /* Feed de Mercado */
        .feed-item { border-left: 3px solid #00ff88; background: #1a1a22; margin: 8px; padding: 10px; font-size: 0.8em; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body id="app-body">

<div class="top-nav">
    <div class="logo-area">IGP <span>MANAGER</span> | INTERCONTINENTAL SERIES</div>
    <div>
        <input type="password" id="pass" placeholder="Admin Pass" style="background:#000; border:1px solid #444; color:white; padding:5px;">
        <button onclick="checkAdmin()" style="background:var(--f1-red); border:none; color:white; padding:5px 15px; cursor:pointer; font-weight:bold;">ACCESO</button>
    </div>
</div>

<div class="main-container">
    <div class="col">
        <div class="col-header">Mercado en Vivo</div>
        <div id="feed-list" style="overflow-y:auto;"></div>
    </div>

    <div class="col">
        <div class="col-header" id="cat-label">Gestión de Equipos</div>
        <div id="team-grid" class="card-grid"></div>
    </div>

    <div class="col">
        <div class="col-header">Generador de Noticias de Fichaje</div>
        <div style="padding:40px; text-align:center; color:#555; font-size:0.9em;">
            <div style="border: 2px dashed #333; padding: 20px; border-radius: 10px;">
                <p>MÓDULO DE NOTICIAS</p>
                <small>Haga clic en un fichaje del mercado para generar la imagen oficial.</small>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBIo1hhtqKMSsBRN2b0b4k3taWugegbo8A",
        authDomain: "igp-mercado-live.firebaseapp.com",
        databaseURL: "https://igp-mercado-live-default-rtdb.firebaseio.com",
        projectId: "igp-mercado-live",
        storageBucket: "igp-mercado-live.firebasestorage.app",
        messagingSenderId: "926047332363",
        appId: "1:926047332363:web:d5f4e257126cea7af6ff0e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;

    function checkAdmin() {
        if(document.getElementById('pass').value === "IGP2026") {
            isAdmin = true;
            document.getElementById('app-body').classList.add('admin-active');
            alert("Modo Administrador: Controles Activados");
            renderTeams(); // Refrescar para mostrar controles
        }
    }

    let globalData = {};
    db.ref('ligas').on('value', snap => {
        globalData = snap.val();
        renderTeams();
    });

    function renderTeams() {
        const grid = document.getElementById('team-grid');
        grid.innerHTML = "";
        let listaEquipos = [];

        for(let cat in globalData) {
            for(let team in globalData[cat]) {
                listaEquipos.push(`${cat}|${team}`);
                const info = globalData[cat][team];
                
                let card = `
                    <div class="team-card">
                        <div class="team-head">
                            <div style="display:flex; justify-content:space-between;">
                                <div class="team-name">${team}</div>
                                <div class="admin-only"><button class="btn-del" onclick="borrar('${cat}','${team}')">ELIMINAR</button></div>
                            </div>
                            <div class="ceo-label">CEO: ${info.ceo}</div>
                        </div>
                        <div class="slot-list">
                            ${[1,2,3,4].map(n => `
                                <div class="slot">
                                    <div><span class="slot-id">P${n}</span> <span class="slot-name">${info['m'+n]}</span></div>
                                    <div class="admin-only">
                                        <select onchange="traspasar('${cat}','${team}','m${n}','${info['m'+n]}', this.value)" style="font-size:0.7em; background:#000; color:#fff;">
                                            <option>Mover a...</option>
                                            ${listaEquipos.map(le => `<option value="${le}">${le.split('|')[1]}</option>`).join('')}
                                        </select>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                grid.innerHTML += card;
            }
        }
    }

    function traspasar(cOrig, tOrig, slot, nombre, tDestFull) {
        if(!tDestFull) return;
        const [cDest, tDest] = tDestFull.split('|');
        db.ref(`ligas/${cOrig}/${tOrig}/${slot}`).set("Libre");
        db.ref(`ligas/${cDest}/${tDest}/m1`).set(nombre); // Por simplicidad a M1 en destino
        db.ref('feed').push({ msg: `[${cDest}] ${nombre} FICHA POR ${tDest}`, time: Date.now() });
    }

    function borrar(c, t) { if(confirm(`¿Borrar ${t}?`)) db.ref(`ligas/${c}/${t}`).remove(); }

    db.ref('feed').limitToLast(10).on('value', snap => {
        const feed = document.getElementById('feed-list');
        feed.innerHTML = "";
        snap.forEach(c => { feed.innerHTML = `<div class="feed-item">${c.val().msg}</div>` + feed.innerHTML; });
    });
</script>
</body>
</html>
