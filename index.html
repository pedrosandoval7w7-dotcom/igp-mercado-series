<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Hub - Internacional Series</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --f1-red: #e10600; --dark: #0b0b0f; --card-bg: #15151e; --gold: #c69c6d; --border: #2b2b35; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        
        .header-main { border-bottom: 4px solid var(--f1-red); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        
        /* Panel de Registro Superior */
        .reg-bar { background: var(--card-bg); padding: 15px; border-radius: 8px; display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; border: 1px solid var(--border); }
        input, select { background: #000; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; }
        .btn-add { background: var(--f1-red); border: none; color: white; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* Grid de Categorías */
        .cat-title { background: var(--f1-red); display: inline-block; padding: 5px 20px; font-weight: bold; border-radius: 4px; margin: 20px 0; }
        .grid-teams { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        /* Tarjeta Estilo Profesional */
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; }
        .card-header { border-bottom: 1px solid var(--border); margin-bottom: 15px; padding-bottom: 10px; display: flex; justify-content: space-between; }
        .team-name { color: var(--gold); font-size: 1.2em; font-weight: bold; text-transform: uppercase; }
        .ceo-name { color: #aaa; font-size: 0.9em; }
        
        /* Slots de los 4 Managers */
        .manager-slot { background: #1f1f2a; margin: 8px 0; padding: 12px; border-radius: 6px; border-left: 4px solid #444; transition: 0.3s; }
        .manager-slot:hover { border-left-color: var(--f1-red); background: #252535; }
        .slot-header { font-size: 0.7em; color: var(--f1-red); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .manager-input { width: 100%; background: transparent; border: none; color: white; font-size: 1em; outline: none; }
        
        .btn-delete { background: none; border: 1px solid #444; color: #666; cursor: pointer; font-size: 0.8em; border-radius: 4px; }
        .btn-delete:hover { color: white; border-color: var(--f1-red); }
    </style>
</head>
<body>

<div class="header-main">
    <h1>INTERCONTINENTAL SERIES HUB</h1>
</div>

<div class="reg-bar">
    <select id="cat">
        <option value="F1">F1</option><option value="F2">F2</option><option value="F3">F3</option>
        <option value="F4">F4</option><option value="F5">F5</option><option value="K6">K6</option>
    </select>
    <input type="text" id="team" placeholder="Nombre Escudería">
    <input type="text" id="ceo" placeholder="Nombre CEO">
    <button class="btn-add" onclick="crearEquipo()">+ CREAR ESCUDERÍA</button>
</div>

<div id="content"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBIo1hhtqKMSsBRN2b0b4k3taWugegbo8A",
        authDomain: "igp-mercado-live.firebaseapp.com",
        databaseURL: "https://igp-mercado-live-default-rtdb.firebaseio.com",
        projectId: "igp-mercado-live",
        storageBucket: "igp-mercado-live.firebasestorage.app",
        messagingSenderId: "926047332363",
        appId: "1:926047332363:web:d5f4e257126cea7af6ff0e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function crearEquipo() {
        const c = document.getElementById('cat').value;
        const t = document.getElementById('team').value;
        const ceo = document.getElementById('ceo').value;
        if(!t || !ceo) return alert("Faltan datos");

        db.ref(`ligas/${c}/${t}`).set({
            ceo: ceo,
            m1: "Manager 1", m2: "Manager 2", m3: "Manager 3", m4: "Manager 4"
        });
    }

    function actualizarManager(cat, equipo, slot, nombre) {
        db.ref(`ligas/${cat}/${equipo}/${slot}`).set(nombre);
    }

    function borrarEquipo(cat, equipo) {
        if(confirm(`¿Borrar ${equipo}?`)) {
            db.ref(`ligas/${cat}/${equipo}`).remove();
        }
    }

    db.ref('ligas').on('value', (snap) => {
        const data = snap.val();
        const main = document.getElementById('content');
        main.innerHTML = "";
        const categorias = ["F1", "F2", "F3", "F4", "F5", "K6"];

        categorias.forEach(c => {
            if(data && data[c]) {
                let html = `<div class="cat-title">${c}</div><div class="grid-teams">`;
                for(let t in data[c]) {
                    const e = data[c][t];
                    html += `
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="team-name">${t}</div>
                                <div class="ceo-name">CEO: ${e.ceo}</div>
                            </div>
                            <button class="btn-delete" onclick="borrarEquipo('${c}','${t}')">Eliminar</button>
                        </div>
                        ${[1,2,3,4].map(n => `
                            <div class="manager-slot">
                                <div class="slot-header">Manager ${n}</div>
                                <input class="manager-input" value="${e['m'+n]}" 
                                       onchange="actualizarManager('${c}','${t}','m${n}', this.value)">
                            </div>
                        `).join('')}
                    </div>`;
                }
                main.innerHTML += html + `</div>`;
            }
        });
    });
</script>
</body>
</html>
