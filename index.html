<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP - Transfer Hub Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --f1-red: #e10600; --bg: #0b0b0f; --panel: #15151e; --gold: #c69c6d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout de 3 Columnas */
        .main-container { display: grid; grid-template-columns: 300px 1fr 350px; gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden; }
        .column { background: var(--panel); border-radius: 8px; border: 1px solid #2b2b35; display: flex; flex-direction: column; }
        .col-header { background: #1f1f2a; padding: 10px; font-weight: bold; border-bottom: 2px solid var(--f1-red); font-size: 0.9em; }
        
        /* Mercado en Vivo */
        #feed { padding: 10px; overflow-y: auto; font-size: 0.85em; }
        .feed-item { border-left: 3px solid #28a745; background: #1a1a24; padding: 8px; margin-bottom: 8px; border-radius: 0 4px 4px 0; }

        /* Gestión de Equipos */
        .scroll-area { overflow-y: auto; padding: 15px; }
        .grid-teams { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #1c1c27; border-radius: 8px; padding: 15px; border: 1px solid #333; }
        .team-title { color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .slot { background: #262632; margin: 5px 0; padding: 8px; border-radius: 4px; font-size: 0.85em; display: flex; justify-content: space-between; }
        .slot input { background: transparent; border: none; color: white; width: 70%; text-align: right; outline: none; }

        /* Estilos de Admin */
        .admin-bar { background: #e10600; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .locked { opacity: 0.6; pointer-events: none; }
        .btn-action { background: black; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="admin-bar">
    <span>INTERCONTINENTAL SERIES - HUB DE FICHAJES</span>
    <div>
        <input type="password" id="admin-pass" placeholder="Clave Admin" style="padding: 5px;">
        <button class="btn-action" onclick="toggleAdmin()">MODO ADMIN</button>
    </div>
</div>

<div class="main-container">
    <!-- COLUMNA 1: MERCADO EN VIVO -->
    <div class="column">
        <div class="col-header">MERCADO EN VIVO</div>
        <div id="feed"></div>
    </div>

    <!-- COLUMNA 2: GESTIÓN (CENTRO) -->
    <div class="column">
        <div class="col-header">GESTIÓN DE EQUIPOS POR CATEGORÍA</div>
        <div class="scroll-area">
            <div id="admin-controls" style="margin-bottom: 20px; display: none;">
                <select id="new-cat"><option value="F1">F1</option><option value="F2">F2</option><option value="K6">K6</option></select>
                <input type="text" id="new-team" placeholder="Nueva Escudería">
                <input type="text" id="new-ceo" placeholder="Nombre CEO">
                <button onclick="crearEquipo()">+ CREAR</button>
            </div>
            <div id="content" class="grid-teams locked"></div>
        </div>
    </div>

    <!-- COLUMNA 3: NOTICIAS (DERECHA) -->
    <div class="column">
        <div class="col-header">GENERADOR DE NOTICIAS</div>
        <div id="news-preview" style="padding: 20px; text-align: center;">
            <p style="color: #666;">Selecciona un cambio para generar imagen...</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBIo1hhtqKMSsBRN2b0b4k3taWugegbo8A",
        authDomain: "igp-mercado-live.firebaseapp.com",
        databaseURL: "https://igp-mercado-live-default-rtdb.firebaseio.com",
        projectId: "igp-mercado-live",
        storageBucket: "igp-mercado-live.firebasestorage.app",
        messagingSenderId: "926047332363",
        appId: "1:926047332363:web:d5f4e257126cea7af6ff0e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    function toggleAdmin() {
        const pass = document.getElementById('admin-pass').value;
        if(pass === "IGP2026") { // Define tu propia clave aquí
            isAdmin = true;
            document.getElementById('content').classList.remove('locked');
            document.getElementById('admin-controls').style.display = 'block';
            alert("Acceso Administrador Concedido");
        } else {
            alert("Clave Incorrecta");
        }
    }

    function crearEquipo() {
        const c = document.getElementById('new-cat').value;
        const t = document.getElementById('new-team').value;
        const ceo = document.getElementById('new-ceo').value;
        db.ref(`ligas/${c}/${t}`).set({ ceo: ceo, m1: "Libre", m2: "Libre", m3: "Libre", m4: "Libre" });
    }

    function actualizar(cat, equipo, slot, nombre, anterior) {
        if(!isAdmin) return;
        db.ref(`ligas/${cat}/${equipo}/${slot}`).set(nombre);
        // Registrar en el Feed
        const log = `${nombre} se une a ${equipo} (${cat})`;
        db.ref('feed').push({ msg: log, time: Date.now() });
    }

    // Carga de Datos
    db.ref('ligas').on('value', (snap) => {
        const data = snap.val();
        const cont = document.getElementById('content');
        cont.innerHTML = "";
        for(let c in data) {
            for(let t in data[c]) {
                const e = data[c][t];
                cont.innerHTML += `
                    <div class="card">
                        <div class="team-title">${t}</div>
                        <div style="font-size: 0.7em; margin-bottom:10px;">CEO: ${e.ceo}</div>
                        ${[1,2,3,4].map(n => `
                            <div class="slot"><span>M${n}</span> 
                            <input value="${e['m'+n]}" onchange="actualizar('${c}','${t}','m${n}', this.value, '${e['m'+n]}')"></div>
                        `).join('')}
                    </div>`;
            }
        }
    });

    // Carga del Feed
    db.ref('feed').limitToLast(10).on('value', (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach(child => {
            feed.innerHTML = `<div class="feed-item">${child.val().msg}</div>` + feed.innerHTML;
        });
    });
</script>
</body>
</html>
