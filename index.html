<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP - Intercontinental Series Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --f1-red: #ff1801; --bg: #0c0c0e; --card: #18181e; --border: #2d2d37; --text: #e1e1e6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-nav { background: #111115; border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #1a1a24; padding: 5px 20px; gap: 10px; border-bottom: 2px solid var(--f1-red); }
        .tab-btn { background: none; border: none; color: #888; padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8em; }
        .tab-btn.active { color: white; border-bottom: 2px solid white; }
        .main-container { display: grid; grid-template-columns: 320px 1fr 380px; gap: 10px; padding: 10px; flex-grow: 1; overflow: hidden; }
        .view { display: none; height: 100%; overflow-y: auto; }
        .view.active { display: block; }
        .col { background: #111115; border-radius: 4px; border: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
        .col-header { background: #1c1c24; padding: 12px; font-size: 0.85em; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .manager-list { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .m-item { background: #22222a; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--f1-red); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; padding: 15px; }
        .team-card { background: var(--card); border-radius: 6px; border: 1px solid var(--border); }
        .team-head { background: linear-gradient(90deg, #1c1c24 0%, #14141a 100%); padding: 12px; font-weight: bold; display: flex; justify-content: space-between; }
        .slot { background: #22222a; margin: 5px; padding: 8px; border-radius: 4px; }
        .feed-item { border-left: 4px solid #00ff88; background: #1a1a22; margin: 8px; padding: 12px; font-size: 0.8em; border-radius: 4px; }
        .admin-only { display: none; }
        .admin-active .admin-only { display: block; }
        input, select { background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 3px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-red { background: var(--f1-red); border: none; color: white; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        .btn-del { background: transparent; color: #555; border: 1px solid #333; cursor: pointer; padding: 2px 6px; font-size: 0.8em; }
    </style>
</head>
<body id="app-body">

<div class="top-nav">
    <div style="font-weight: 800;">IGP <span style="color:var(--f1-red)">MANAGER</span> | INTERCONTINENTAL</div>
    <div style="display: flex; gap: 5px;">
        <input type="password" id="pass" placeholder="Clave">
        <button onclick="checkAdmin()" style="background:var(--f1-red); color:white; border:none; padding:5px 15px; cursor:pointer;">OK</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('mercado')">Mercado & Equipos</button>
    <button class="tab-btn" onclick="switchTab('db')">Managers Intercontinental</button>
</div>

<div id="view-mercado" class="view active">
    <div class="main-container">
        <div class="col"><div class="col-header">Mercado Live</div><div id="feed-list" style="overflow-y:auto;"></div></div>
        <div class="col">
            <div class="col-header">Gestión de Equipos</div>
            <div class="admin-only" style="padding:15px; background:#1a1a24;">
                <input type="text" id="new-team" placeholder="Equipo">
                <input type="text" id="new-ceo" placeholder="CEO">
                <select id="new-cat">
                    <option>F1</option><option>F2</option><option>F3</option><option>F4</option><option>F5</option><option>K6</option>
                </select>
                <button class="btn-red" onclick="crearEquipo()">REGISTRAR</button>
            </div>
            <div id="team-grid" class="card-grid"></div>
        </div>
        <div class="col"><div class="col-header">Noticias</div><div id="news-preview" style="padding:20px; text-align:center; color:#444;">ACTIVO</div></div>
    </div>
</div>

<div id="view-db" class="view">
    <div class="db-form admin-only">
        <input type="text" id="db-name" placeholder="Nombre Manager">
        <button class="btn-red" onclick="registrarEnDB()">GUARDAR EN DB</button>
    </div>
    <div id="db-list" class="manager-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBIo1hhtqKMSsBRN2b0b4k3taWugegbo8A",
        authDomain: "igp-mercado-live.firebaseapp.com",
        databaseURL: "https://igp-mercado-live-default-rtdb.firebaseio.com",
        projectId: "igp-mercado-live",
        storageBucket: "igp-mercado-live.firebasestorage.app",
        messagingSenderId: "926047332363",
        appId: "1:926047332363:web:d5f4e257126cea7af6ff0e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;
    let managersDB = ["Libre"];
    let dataCache = {};

    function checkAdmin() {
        if(document.getElementById('pass').value === "IGP2026") {
            isAdmin = true;
            document.getElementById('app-body').classList.add('admin-active');
            alert("ADMIN ACTIVADO");
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        event.target.classList.add('active');
    }

    function registrarEnDB() {
        const n = document.getElementById('db-name').value;
        if(n) db.ref('managers_db').push(n);
        document.getElementById('db-name').value = "";
    }

    db.ref('managers_db').on('value', snap => {
        const list = document.getElementById('db-list');
        list.innerHTML = ""; managersDB = ["Libre"];
        snap.forEach(c => {
            managersDB.push(c.val());
            list.innerHTML += `<div class="m-item"><span>${c.val()}</span><button class="admin-only btn-del" onclick="db.ref('managers_db/${c.key}').remove()">X</button></div>`;
        });
        renderTeams();
    });

    function crearEquipo() {
        const t = document.getElementById('new-team').value;
        const c = document.getElementById('new-ceo').value;
        const cat = document.getElementById('new-cat').value;
        if(t && c) db.ref(`ligas/${cat}/${t}`).set({ ceo: c, m1: "Libre", m2: "Libre", m3: "Libre", m4: "Libre" });
    }

    function asignar(catDest, teamDest, slot, nombre) {
        if(!isAdmin) return;
        if(nombre === "Libre") { db.ref(`ligas/${catDest}/${teamDest}/${slot}`).set("Libre"); return; }

        let origen = "Agente Libre";
        for(let c in dataCache) {
            for(let t in dataCache[c]) {
                for(let i=1; i<=4; i++) {
                    if(dataCache[c][t]['m'+i] === nombre) {
                        origen = t;
                        db.ref(`ligas/${c}/${t}/m${i}`).set("Libre");
                    }
                }
            }
        }

        db.ref(`ligas/${catDest}/${teamDest}/${slot}`).set(nombre);
        let msg = `<b>${nombre}</b> ficha por ${teamDest}`;
        if(origen !== "Agente Libre") msg = `<b>${nombre}</b> pasa de ${origen} a ${teamDest}`;
        db.ref('feed').push({ msg: msg, time: Date.now() });
    }

    function renderTeams() {
        db.ref('ligas').on('value', snap => {
            dataCache = snap.val() || {};
            const grid = document.getElementById('team-grid'); grid.innerHTML = "";
            for(let c in dataCache) {
                for(let t in dataCache[c]) {
                    const e = dataCache[c][t];
                    let card = `<div class="team-card"><div class="team-head"><div>${t}<br><small>${c}</small></div><button class="admin-only btn-del" onclick="db.ref('ligas/${c}/${t}').remove()">X</button></div>`;
                    [1,2,3,4].forEach(n => {
                        const actual = e['m'+n];
                        card += `<div class="slot"><small style="color:var(--f1-red)">M${n}</small><br>
                            <span class="view-only">${actual}</span>
                            <select class="admin-only" onchange="asignar('${c}','${t}','m${n}', this.value)">
                                ${managersDB.map(m => `<option value="${m}" ${m === actual ? 'selected' : ''}>${m}</option>`).join('')}
                            </select></div>`;
                    });
                    grid.innerHTML += card + `</div>`;
                }
            }
        });
    }

    db.ref('feed').limitToLast(15).on('value', snap => {
        const fl = document.getElementById('feed-list'); fl.innerHTML = "";
        snap.forEach(c => { fl.innerHTML = `<div class="feed-item">${c.val().msg}</div>` + fl.innerHTML; });
    });

    renderTeams();
</script>
</body>
</html>
